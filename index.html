<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaClone V2</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">Instagram</div>
            <div class="header-icons">
                <i class="far fa-heart"></i>
                <i class="far fa-paper-plane"></i>
                <i class="fas fa-moon" id="theme-toggle"></i>
            </div>
        </header>

        <!-- Stories Section -->
        <div class="stories-container">
            <div class="story" style="background-image: url('https://via.placeholder.com/100/FF5733/FFFFFF?text=You');">
                <div class="story-ring"></div>
                <span class="story-name">Your Story</span>
            </div>
            <div class="story" style="background-image: url('https://via.placeholder.com/100/33FF57/FFFFFF?text=Alex');">
                <div class="story-ring"></div>
                <span class="story-name">alex_dev</span>
            </div>
            <div class="story" style="background-image: url('https://via.placeholder.com/100/3357FF/FFFFFF?text=Sarah');">
                <div class="story-ring"></div>
                <span class="story-name">sarah_travels</span>
            </div>
            <div class="story" style="background-image: url('https://via.placeholder.com/100/FF33A8/FFFFFF?text=Mike');">
                <div class="story-ring"></div>
                <span class="story-name">mike_fitness</span>
            </div>
        </div>

        <!-- Feed -->
        <div class="feed" id="feed">
            <!-- Posts injected here -->
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <i class="fas fa-home active"></i>
            <i class="fas fa-search"></i>
            <i class="far fa-plus-square" id="add-post-btn"></i>
            <i class="far fa-play-circle"></i>
            <img src="https://via.placeholder.com/32" class="nav-avatar">
        </nav>
    </div>

    <!-- Add Post Modal -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <h3>Create New Post</h3>
            <input type="text" id="captionInput" placeholder="Write a caption...">
            <input type="file" id="imageInput" accept="image/*">
            <br>
            <button class="btn" id="shareBtn">Share</button>
            <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
        </div>
    </div>

    <!-- JS Link -->
    <script src="script.js"></script>
</body>
</html>
